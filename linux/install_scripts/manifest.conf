# Install script manifest - defines installation order and grouping
# Sections are executed in order. Scripts within each section are executed in order.
#
# IMPORTANT: Order matters! Scripts may depend on earlier scripts:
#   - Shell Setup: ohmyzsh.sh must run before zsh_plugins.sh and powerlevel10k.sh
#   - dotfiles.sh must run after all shell plugins are installed
#
# See @depends metadata in individual scripts for explicit dependencies.

