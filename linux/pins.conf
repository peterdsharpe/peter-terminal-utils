# Pinned git repository versions
# Format: repo_name = full_commit_sha_or_release_tag
#
# repo_name is the basename of the git URL (e.g., "powerlevel10k" from
# https://github.com/romkatv/powerlevel10k.git). Case-sensitive.
#
# Use release tags for repos with a healthy release cadence (more readable,
# represent tested snapshots). Use commit SHAs for repos without releases or
# to pin around a specific bug.
#
# Omit or comment out an entry to track HEAD. Empty values are ignored.
# When a pin is behind upstream, setup prints a warning with update instructions.

